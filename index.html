<!DOCTYPE html>

    <title>Juego de Triqui</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="contenedor">
        <h1>Juego de Triqui</h1>
        
        <div id="estado" class="estado">Turno de: X</div>
        
        <div class="tablero">
            <div class="casilla" data-index="0"></div>

            <div class="casilla" data-index="6"></div>
            <div class="casilla" data-index="7"></div>
            <div class="casilla" data-index="8"></div>
        </div>

        <button id="btn-reiniciar">Reiniciar Juego</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
